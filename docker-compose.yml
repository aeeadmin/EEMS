version: '3.8'
expose:
  - "5000"
services:
  database:
    image: mysql:8.0
    container_name: tneb_database
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Arun@123
      MYSQL_DATABASE: tneb_eems
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: ./backend
    container_name: tneb_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=database
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=Arun@123
      - DB_NAME=tneb_eems
      - JWT_SECRET=tneb_eems_super_secret_jwt_key_2024
      - JWT_EXPIRES_IN=8h
      - FRONTEND_URL=http://localhost
      - NODE_ENV=production
    depends_on:
      - database

  frontend:
    build: ./frontend
    container_name: tneb_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
